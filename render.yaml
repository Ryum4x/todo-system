services:
  - type: web
    name: todo-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: todo-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://todo-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://todo-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString

  - type: web
    name: todo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://todo-backend.onrender.com/api

databases:
  - name: todo-db
    databaseName: todo_db
    user: todo_user
